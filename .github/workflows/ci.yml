name: C++ GCC CI with Makefile

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Environment and Execution Test
        run: make test

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: pratice
          path: my_app.exe